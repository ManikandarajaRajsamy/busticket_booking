<div class="app-shell">
  <header class="topbar">
    <a class="brand" [routerLink]="homeLink((currentUser$ | async) ?? null)">
      <span class="brand-mark">RB</span>
      <div>
        <strong>{{ title }}</strong>
        <small>Angular passenger experience</small>
      </div>
    </a>

    <nav class="nav-links">
      <ng-container *ngIf="currentUser$ | async as user; else guestNav">
        <a *ngIf="isAdmin(user)" routerLink="/admin" routerLinkActive="active">Admin Dashboard</a>
        <ng-container *ngIf="!isAdmin(user)">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Search</a>
          <a routerLink="/bookings" routerLinkActive="active">My Bookings</a>
        </ng-container>
      </ng-container>
      <ng-template #guestNav>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Search</a>
      </ng-template>
    </nav>

    <div class="auth-actions" *ngIf="currentUser$ | async as user; else guestActions">
      <span class="welcome">{{ displayName(user) }}</span>
      <button type="button" class="secondary-button" (click)="logout()">Logout</button>
    </div>
  </header>

  <ng-template #guestActions>
    <div class="auth-actions">
      <a class="text-link" routerLink="/login">Login</a>
      <a class="outline-link" routerLink="/register">Register</a>
    </div>
  </ng-template>

  <main class="content-shell">
    <router-outlet></router-outlet>
  </main>
</div>
